<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Privado - Eduardo Rendón</title>
    <style>
        /* Fondo completamente blanco como pediste */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #2c3e50;
        }

        .login-wrapper {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        /* Tarjeta limpia y moderna con sombra suave para que resalte en el fondo blanco */
        .login-card {
            background: #ffffff;
            border: 1px solid #eaeded;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            transition: transform 0.3s ease;
            padding-bottom: 20px;
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.12);
        }

        .login-header {
            text-align: center;
            padding: 35px 30px 15px;
        }

        .login-header h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 2px;
            color: #2c3e50;
            text-transform: uppercase;
            font-weight: 800;
        }

        /* Estilo para tu logo */
        .logo-img {
            max-width: 120px; /* Tamaño del logo */
            height: auto;
            margin: 15px auto;
            display: block;
            border-radius: 8px; /* Opcional, si quieres bordes redondeados en el logo */
        }

        /* La frase épica */
        .login-header p {
            color: #7f8c8d;
            font-size: 14px;
            font-weight: 500;
            font-style: italic;
            line-height: 1.5;
            margin-top: 15px;
            padding: 0 10px;
        }

        .login-body {
            padding: 20px 35px 20px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: #95a5a6;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* Caja de texto adaptada al fondo blanco */
        .form-group input {
            width: 100%;
            padding: 15px;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            color: #2c3e50;
            font-size: 20px;
            text-align: center;
            font-family: monospace;
            letter-spacing: 4px;
            text-transform: uppercase;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .form-group input:focus {
            border-color: #3498db;
            background: #ffffff;
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.15);
        }

        .form-group input::placeholder {
            color: #bdc3c7;
            letter-spacing: 1px;
            font-size: 16px;
            font-weight: normal;
        }

        /* Botón elegante */
        .btn-submit {
            width: 100%;
            background: linear-gradient(90deg, #2980b9 0%, #2c3e50 100%);
            color: #fff;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(44, 62, 80, 0.2);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(44, 62, 80, 0.3);
            background: linear-gradient(90deg, #3498db 0%, #34495e 100%);
        }

        .btn-submit:active {
            transform: translateY(2px);
            box-shadow: 0 2px 10px rgba(44, 62, 80, 0.2);
        }

        /* Mensaje de error */
        .error-message {
            background: #fdedec;
            color: #c0392b;
            border-left: 4px solid #e74c3c;
            padding: 12px 15px;
            text-align: center;
            border-radius: 6px;
            margin-bottom: 25px;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 0.5px;
            animation: shake 0.4s ease-in-out;
        }

        .login-footer {
            text-align: center;
            margin-top: 25px;
            color: #bdc3c7;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            50% { transform: translateX(6px); }
            75% { transform: translateX(-6px); }
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            
            <div class="login-header">
                <h1>EDUARDO RENDON</h1>
                
                <img src="/images/logo.png" alt="Logo de Eduardo" class="logo-img" onerror="this.style.display='none'">
                
                <p>"Si no tienes un código de acceso, es porque no eres digno de mi amistad."</p>
            </div>

            <div class="login-body">
                
                {% if error %}
                    <div class="error-message">
                        ⚠️ {{ error }}
                    </div>
                {% endif %}

                <form method="POST" action="/login">
                    <div class="form-group">
                        <label for="codigo">Código Secreto</label>
                        <input type="text" id="codigo" name="codigo" placeholder="Escribe tu código" required autocomplete="off" autofocus>
                    </div>
                    
                    <button type="submit" class="btn-submit">Ingresar</button>
                </form>

            </div>
        </div>
        
        <div class="login-footer">
            Sistema de Simulación Privado
        </div>
    </div>

</body>
</html>
